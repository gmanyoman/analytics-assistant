<!DOCTYPE html>
<html>
<head>
  <title>AI Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f5f7;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 6px 0;
    }

    .sub {
      color: #666;
      margin-bottom: 12px;
      font-size: 13px;
    }

    /* 검색바 */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 140px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    /* GRID 핵심 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      grid-template-rows: auto auto;
      gap: 12px;
      height: calc(100vh - 140px);
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* KPI */
    .kpi {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .kpi div {
      flex: 1;
      text-align: center;
      background: #fafafa;
      margin: 4px;
      padding: 10px;
      border-radius: 10px;
    }

    .kpi h3 {
      margin: 0;
      font-size: 11px;
      color: #666;
    }

    .kpi p {
      margin: 6px 0 0 0;
      font-size: 18px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 6px;
      text-align: left;
    }

    th {
      background: #fafafa;
    }

    .ai {
      font-size: 12px;
      white-space: pre-line;
      line-height: 1.5;
    }

    canvas {
      width: 100% !important;
      height: 260px !important;
    }

    .title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

  </style>
</head>

<body>

<div class="container">

<h1>AI-Powered Analytics Assistant</h1>
<div class="sub">질문 기반으로 사용자 행동을 분석하고 인사이트를 제공합니다</div>

<div class="search-bar">
  <input id="q" placeholder="예: 결제 실패가 왜 증가했을까?" />
  <button onclick="run()">분석 실행</button>
</div>

<div class="grid">

  <!-- KPI -->
  <div class="card">
    <div class="title">📊 KPI</div>
    <div class="kpi" id="kpi"></div>
  </div>

  <!-- CHART -->
  <div class="card">
    <div class="title">📈 Funnel</div>
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="title">📋 분석 결과</div>
    <div id="table"></div>
  </div>

  <!-- AI -->
  <div class="card">
    <div class="title">🤖 AI Insight</div>
    <div class="ai" id="ai"></div>
  </div>

</div>

</div>

<script>

let chart;

function run(){

  const q = document.getElementById("q").value || "전환 분석";

  // KPI
  document.getElementById("kpi").innerHTML = `
    <div><h3>전환율</h3><p>${rand(50,90)}%</p></div>
    <div><h3>실패율</h3><p>${rand(10,40)}%</p></div>
    <div><h3>이탈율</h3><p>${rand(10,60)}%</p></div>
  `;

  // TABLE
  document.getElementById("table").innerHTML =
  q.includes("결제") ?
  `
    <table>
      <tr><th>원인</th><th>비율</th></tr>
      <tr><td>UX</td><td>${rand(20,50)}%</td></tr>
      <tr><td>네트워크</td><td>${rand(10,30)}%</td></tr>
      <tr><td>카드 실패</td><td>${rand(10,40)}%</td></tr>
    </table>
  `
  :
  `
    <table>
      <tr><th>단계</th><th>유저</th></tr>
      <tr><td>Home</td><td>${rand(800,1200)}</td></tr>
      <tr><td>Detail</td><td>${rand(400,800)}</td></tr>
      <tr><td>Cart</td><td>${rand(200,500)}</td></tr>
      <tr><td>Payment</td><td>${rand(100,300)}</td></tr>
    </table>
  `;

  // AI
  document.getElementById("ai").innerText = `
원인 분석:
- funnel 특정 구간 이탈 집중

가설:
- UX friction / 채널 품질 문제

해결:
- 결제 UX 개선
- onboarding 개선

액션:
- A/B 테스트
- 리타겟팅
- drop 구간 개선
  `;

  draw();

}

function draw(){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels:["Home","Search","Detail","Cart","Pay"],
      datasets:[{
        label:"users",
        data:[
          rand(800,1200),
          rand(500,900),
          rand(300,700),
          rand(200,500),
          rand(100,300)
        ]
      }]
    }
  });

}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

window.onload = run;

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Role Dashboard</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    select {
      padding: 10px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<h1>Analytics Dashboard</h1>

<select id="role">
  <option value="marketing">Marketing</option>
  <option value="settlement">Settlement</option>
</select>

<button onclick="generate()">
  Generate Data
</button>

<div id="output"></div>

<script>
function generate() {
  const role = document.getElementById("role").value;
  const output = document.getElementById("output");

  if (role === "marketing") {
    output.innerHTML = `
      <div class="card">
        <h2>Marketing Funnel</h2>

        <p>Page View: 1,000</p>
        <p>Product View: 700</p>
        <p>Add To Cart: 400</p>
        <p>Purchase: 200</p>
      </div>
    `;
  }

  if (role === "settlement") {
    output.innerHTML = `
      <div class="card">
        <h2>Payment Metrics</h2>

        <p>Total Amount: ₩12,000,000</p>
        <p>Success Rate: 92%</p>
        <p>Failed Payments: 34</p>
      </div>
    `;
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>PathFinder AI</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      font-family: Arial;
      background: #f4f5f7;
      padding: 30px;
      color: #111;
    }

    h1 {
      margin-bottom: 10px;
    }

    .sub {
      color: #666;
      margin-bottom: 30px;
    }

    .section {
      background: white;
      padding: 24px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      margin-top: 10px;
      font-size: 15px;
    }

    button {
      cursor: pointer;
      border: none;
      background: black;
      color: white;
    }

    .cards {
      display: flex;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 220px;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    .card p {
      font-size: 30px;
      margin-top: 10px;
      font-weight: bold;
    }

    .ai-box {
      background: #111;
      color: white;
      padding: 24px;
      border-radius: 18px;
      line-height: 1.8;
      margin-top: 20px;
    }

    .flow-box {
      background: white;
      padding: 24px;
      border-radius: 18px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      line-height: 2;
    }

    .chart-box {
      background: white;
      padding: 24px;
      border-radius: 18px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .next-actions {
      margin-top: 20px;
    }

    .action-btn {
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .analysis-result {
      background: #eef3ff;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      line-height: 1.8;
    }

  </style>
</head>

<body>

<h1>PathFinder AI</h1>

<div class="sub">
  AI 기반 사용자 행동 탐색 플랫폼
</div>

<div class="section">

  <h3>🔍 무엇이 궁금한가요?</h3>

  <input
    id="question"
    placeholder="예: 왜 결제 실패 후 돌아오지 않았을까?"
  />

  <button onclick="analyze()">
    AI 분석 시작
  </button>

</div>

<div class="cards" id="cards"></div>

<div class="chart-box">
  <canvas id="myChart"></canvas>
</div>

<div class="flow-box" id="flowBox">
  사용자 행동 흐름이 여기에 표시됩니다.
</div>

<div class="ai-box" id="aiInsight">
  AI Insight가 여기에 표시됩니다.
</div>

<div class="section">

  <h3>🚀 추천 다음 액션</h3>

  <div class="next-actions">

    <button
      class="action-btn"
      onclick="nextAnalysis('card')"
    >
      카드사별 실패율 비교
    </button>

    <button
      class="action-btn"
      onclick="nextAnalysis('device')"
    >
      iOS / Android 결제 성공률 비교
    </button>

    <button
      class="action-btn"
      onclick="nextAnalysis('funnel')"
    >
      신규 사용자 결제 퍼널 분석
    </button>

  </div>

  <div
    class="analysis-result"
    id="analysisResult"
  >
    추가 분석 결과가 여기에 표시됩니다.
  </div>

</div>

<script>

let chart;

function random(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function analyze() {

  const question = document
    .getElementById("question")
    .value;

  const cards = document
    .getElementById("cards");

  const flowBox = document
    .getElementById("flowBox");

  const aiInsight = document
    .getElementById("aiInsight");

  let labels = [];
  let values = [];

  // KPI Cards

  const successRate = random(85, 98);
  const failCount = random(10, 120);
  const dropRate = random(5, 40);

  cards.innerHTML = `

    <div class="card">
      <h3>결제 성공률</h3>
      <p>${successRate}%</p>
    </div>

    <div class="card">
      <h3>실패 건수</h3>
      <p>${failCount}</p>
    </div>

    <div class="card">
      <h3>이탈률</h3>
      <p>${dropRate}%</p>
    </div>

  `;

  // User Flow

  flowBox.innerHTML = `

    <h3>👤 USER_1024 행동 흐름</h3>

    09:10 홈 진입<br>
    09:12 상품 조회<br>
    09:15 장바구니 담기<br>
    09:16 결제 시도<br>
    09:16 카드 인증 실패<br>
    09:17 앱 종료

  `;

  // AI Insight

  aiInsight.innerHTML = `

    <h3>🤖 AI Insight</h3>

    결제 실패 이후 재진입이 발생하지 않았습니다.<br><br>

    특히 iOS 신규 사용자 그룹에서
    동일 시간대 카드 인증 실패율 증가가 확인되었습니다.<br><br>

    광고 유입 사용자의 결제 완료율은
    전일 대비 18% 감소했습니다.<br><br>

    결제 인증 단계 UX 또는
    특정 카드사 오류 여부를 확인하는 것을 추천합니다.

  `;

  labels = [
    "홈",
    "상품조회",
    "장바구니",
    "결제시도",
    "구매완료"
  ];

  values = [
    1200,
    980,
    620,
    400,
    280
  ];

  if (chart) {
    chart.destroy();
  }

  const ctx = document
    .getElementById("myChart");

  chart = new Chart(ctx, {

    type: "bar",

    data: {

      labels: labels,

      datasets: [{

        label: "퍼널 흐름",

        data: values

      }]
    }

  });

}

function nextAnalysis(type) {

  const result = document
    .getElementById("analysisResult");

  if (type === "card") {

    result.innerHTML = `

      <h3>💳 카드사별 실패율 비교</h3>

      A카드 실패율이 평균 대비
      2.3배 높게 나타났습니다.<br><br>

      특정 카드 인증 응답 지연이
      결제 이탈 증가와 연관될 가능성이 있습니다.

    `;
  }

  if (type === "device") {

    result.innerHTML = `

      <h3>📱 디바이스별 결제 성공률</h3>

      iOS 사용자의 결제 성공률이
      Android 대비 14% 낮게 나타났습니다.<br><br>

      특히 특정 OS 버전에서
      인증 완료 이탈이 증가했습니다.

    `;
  }

  if (type === "funnel") {

    result.innerHTML = `

      <h3>🛒 신규 사용자 결제 퍼널 분석</h3>

      신규 사용자의 장바구니 진입률은 높았지만,
      결제 완료 단계에서 급격한 이탈이 발생했습니다.<br><br>

      첫 결제 UX 또는 할인 조건 노출 여부를
      추가 확인하는 것을 추천합니다.

    `;
  }

}

</script>

</body>
</html>

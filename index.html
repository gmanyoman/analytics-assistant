<!DOCTYPE html>
<html>
<head>
  <title>AI-Powered Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f5f7;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 30px;
    }

    h1 {
      margin-bottom: 6px;
    }

    .sub {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .section {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 8px 12px;
      background: #eee;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .chip:hover {
      background: #ddd;
    }

    .cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 180px;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 13px;
      color: #666;
      margin: 0;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      margin-top: 8px;
    }

    .box {
      background: #111;
      color: white;
      padding: 18px;
      border-radius: 14px;
      margin-top: 16px;
      line-height: 1.6;
    }

    canvas {
      margin-top: 16px;
      background: white;
      padding: 10px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 13px;
    }

    th {
      background: #fafafa;
    }

  </style>
</head>

<body>

<div class="container">

<h1>AI-Powered Analytics Assistant</h1>

<div class="sub">
질문 기반으로 사용자 행동을 탐색하고<br>
분석 방향과 인사이트를 추천합니다.
</div>

<div class="section">

  <h3>🔍 무엇이 궁금한가요?</h3>

  <input id="question" placeholder="질문을 선택하거나 입력하세요">

  <div class="chips">
    <div class="chip" onclick="setQuestion(this)">전환율이 왜 떨어질까?</div>
    <div class="chip" onclick="setQuestion(this)">어떤 채널이 효율적일까?</div>
    <div class="chip" onclick="setQuestion(this)">결제 실패가 증가했을까?</div>
    <div class="chip" onclick="setQuestion(this)">이 사용자는 왜 이탈했을까?</div>
    <div class="chip" onclick="setQuestion(this)">광고 유입 사용자는 왜 전환이 낮을까?</div>
  </div>

  <button onclick="runAnalysis()">AI 분석 실행</button>

</div>

<div class="cards" id="cards"></div>

<canvas id="chart"></canvas>

<div class="section" id="tableBox"></div>

<div class="box" id="insightBox"></div>

</div>

<script>

let logs = [];
let chart;

function generateLogs() {

  const users = Array.from({ length: 80 }, (_, i) => "USER_" + (1000 + i));

  const events = [
    "home_view",
    "search",
    "product_view",
    "add_to_cart",
    "payment_attempt",
    "payment_fail",
    "purchase_complete",
    "banner_click",
    "exit"
  ];

  const logCount = randomInt(120, 300);
  const result = [];

  for (let i = 0; i < logCount; i++) {
    result.push({
      user_id: pick(users),
      event_name: pick(events),
      device: Math.random() > 0.5 ? "iOS" : "Android",
      channel: Math.random() > 0.5 ? "ad" : "organic",
      ts: "2026-05-08"
    });
  }

  return result;
}

function runAnalysis() {

  const q = document.getElementById("question").value || "전환 분석";

  const cards = document.getElementById("cards");
  const insightBox = document.getElementById("insightBox");
  const tableBox = document.getElementById("tableBox");

  // KPI
  const conv = randomInt(40, 95);
  const fail = randomInt(5, 40);
  const drop = randomInt(10, 60);

  cards.innerHTML = `
    <div class="card"><h3>전환율</h3><p>${conv}%</p></div>
    <div class="card"><h3>실패율</h3><p>${fail}%</p></div>
    <div class="card"><h3>이탈률</h3><p>${drop}%</p></div>
  `;

  drawChart();

  // 질문별 다른 테이블
  if (q.includes("채널")) {
    tableBox.innerHTML = `
      <h3>채널별 성과</h3>
      <table>
        <tr><th>채널</th><th>전환율</th></tr>
        <tr><td>광고</td><td>${randomInt(10,40)}%</td></tr>
        <tr><td>오가닉</td><td>${randomInt(30,70)}%</td></tr>
      </table>
    `;
  }

  else if (q.includes("결제")) {
    tableBox.innerHTML = `
      <h3>결제 실패 분석</h3>
      <table>
        <tr><th>원인</th><th>비율</th></tr>
        <tr><td>결제 UX</td><td>${randomInt(20,50)}%</td></tr>
        <tr><td>네트워크</td><td>${randomInt(10,30)}%</td></tr>
        <tr><td>카드 실패</td><td>${randomInt(10,40)}%</td></tr>
      </table>
    `;
  }

  else {
    tableBox.innerHTML = `
      <h3>퍼널 분석</h3>
      <table>
        <tr><th>단계</th><th>유저 수</th></tr>
        <tr><td>Home</td><td>${randomInt(800,1200)}</td></tr>
        <tr><td>Detail</td><td>${randomInt(400,800)}</td></tr>
        <tr><td>Payment</td><td>${randomInt(100,400)}</td></tr>
      </table>
    `;
  }

  insightBox.innerHTML = `
    <h3>🤖 AI Insight</h3>
    ${q}<br><br>
    현재 데이터에서는 특정 단계에서 이탈이 집중되고 있으며,<br>
    유입 채널과 디바이스별 차이가 주요 요인으로 보입니다.
  `;
}

function drawChart() {

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Home", "Search", "Detail", "Cart", "Payment"],
      datasets: [{
        label: "Flow",
        data: [
          randomInt(800,1200),
          randomInt(500,900),
          randomInt(300,700),
          randomInt(200,500),
          randomInt(100,300)
        ]
      }]
    }
  });

}

function setQuestion(el) {
  document.getElementById("question").value = el.innerText;
  runAnalysis();
}

// utils
function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

// init (페이지 들어올 때마다 새 데이터 생성)
window.onload = function() {
  logs = generateLogs();
  runAnalysis();
};

</script>

</body>
</html>

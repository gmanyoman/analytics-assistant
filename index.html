<!DOCTYPE html>
<html>
<head>
  <title>AI-Powered Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f5f7;
      padding: 30px;
      color: #111;
    }

    h1 { margin-bottom: 6px; }

    .sub {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: black;
      color: white;
      cursor: pointer;
      border: none;
    }

    .cards {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 180px;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 13px;
      color: #666;
      margin: 0;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      margin-top: 8px;
    }

    .box {
      background: #111;
      color: white;
      padding: 18px;
      border-radius: 14px;
      margin-top: 16px;
      line-height: 1.6;
    }

    canvas {
      margin-top: 16px;
      background: white;
      padding: 10px;
      border-radius: 12px;
    }

  </style>
</head>

<body>

<h1>AI-Powered Analytics Assistant</h1>

<div class="sub">
질문 기반으로 사용자 행동을 탐색하고<br>
분석 방향과 인사이트를 추천합니다.
</div>

<div class="section">

  <h3>👤 누구를 분석하고 싶나요?</h3>
  <input id="userInput" placeholder="예: 신규 사용자 / 광고 유입 / USER_1024">

  <h3>🔍 무엇이 궁금한가요?</h3>
  <input id="question" placeholder="예: 결제 실패 후 왜 이탈했을까?">

  <button onclick="runAnalysis()">AI 분석 실행</button>

  <button onclick="regenerateLogs()" style="margin-top:8px; background:#444;">
    🔄 새로운 데이터 생성
  </button>

</div>

<div class="cards" id="cards"></div>

<canvas id="chart"></canvas>

<div class="box" id="flowBox">
  사용자 행동 흐름이 여기에 표시됩니다.
</div>

<div class="box" id="insightBox">
  AI Insight가 여기에 표시됩니다.
</div>

<script>

let logs = [];
let chart;

// ---------------------------
// 1. 랜덤 로그 생성
// ---------------------------
function generateLogs() {

  const users = Array.from(
    { length: 80 },
    (_, i) => "USER_" + (1000 + i)
  );

  const events = [
    "home_view",
    "search",
    "product_view",
    "add_to_cart",
    "payment_attempt",
    "payment_fail",
    "purchase_complete",
    "banner_click",
    "exit"
  ];

  const devices = ["iOS", "Android"];
  const channels = ["ad", "organic"];

  const logCount = randomInt(100, 300);
  const result = [];

  for (let i = 0; i < logCount; i++) {

    const user = pick(users);

    result.push({
      user_id: user,
      event_name: pick(events),
      device: pick(devices),
      channel: pick(channels),
      ts: "2026-05-08"
    });

  }

  return result;
}

// ---------------------------
// 2. 분석 실행
// ---------------------------
function runAnalysis() {

  const user = document.getElementById("userInput").value || "ALL";
  const question = document.getElementById("question").value;

  const cards = document.getElementById("cards");
  const flowBox = document.getElementById("flowBox");
  const insightBox = document.getElementById("insightBox");

  // KPI
  const success = randomInt(60, 95);
  const fail = randomInt(5, 40);
  const drop = randomInt(10, 50);

  cards.innerHTML = `
    <div class="card"><h3>전환율</h3><p>${success}%</p></div>
    <div class="card"><h3>실패율</h3><p>${fail}%</p></div>
    <div class="card"><h3>이탈률</h3><p>${drop}%</p></div>
  `;

  // Flow
  const sampleFlow = logs.slice(0, 8)
    .map(l => l.event_name)
    .join(" → ");

  flowBox.innerHTML = `
    <h3>👤 사용자 Flow (${user})</h3>
    ${sampleFlow}
  `;

  // Insight
  insightBox.innerHTML = `
    <h3>🤖 AI Insight</h3>

    ${question || "결제 실패 이후 행동 분석"}<br><br>

    광고 유입 사용자의 전환율이 낮게 나타났습니다.<br>
    특히 payment_fail 이후 재진입률 감소가 확인되었습니다.<br><br>

    → 결제 UX 또는 유입 품질 점검 필요
  `;

  drawChart();
}

// ---------------------------
// 3. 차트
// ---------------------------
function drawChart() {

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Home", "Search", "Detail", "Cart", "Payment"],
      datasets: [{
        label: "User Flow",
        data: [
          randomInt(800, 1200),
          randomInt(600, 900),
          randomInt(400, 700),
          randomInt(200, 500),
          randomInt(100, 300)
        ]
      }]
    }
  });

}

// ---------------------------
// 4. 새 데이터 생성
// ---------------------------
function regenerateLogs() {
  logs = generateLogs();
  runAnalysis();
}

// ---------------------------
// utils
// ---------------------------
function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// init
window.onload = function () {
  logs = generateLogs();
};

</script>

</body>
</html>

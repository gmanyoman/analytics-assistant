<!DOCTYPE html>
<html>
<head>
  <title>AI-Powered Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f5f7;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 860px;
      padding: 24px;
    }

    h1 { margin-bottom: 6px; }

    .sub {
      color: #666;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .section {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* 🔍 검색바 (핵심 변경) */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 0;
    }

    .search-bar button {
      width: 160px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 8px 12px;
      background: #eee;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 160px;
      background: #fff;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 12px;
      color: #666;
      margin: 0;
    }

    .card p {
      font-size: 20px;
      font-weight: bold;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    th {
      background: #fafafa;
      text-align: left;
    }

    .box {
      background: #111;
      color: white;
      padding: 16px;
      border-radius: 14px;
      white-space: pre-line;
      margin-top: 14px;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="container">

<h1>AI-Powered Analytics Assistant</h1>

<div class="sub">
질문 기반으로 사용자 행동을 탐색하고<br>
분석 방향과 인사이트를 추천합니다.
</div>

<!-- 질문 영역 -->
<div class="section">

  <h3>🔍 무엇이 궁금한가요?</h3>

  <div class="search-bar">
    <input id="question"
      placeholder="예: 결제 실패가 왜 증가했을까? / 어떤 채널이 효율적인가?"
    />
    <button onclick="run()">AI 분석 실행</button>
  </div>

  <div class="hint">
    💡 질문을 입력하거나 추천 질문을 클릭하세요
  </div>

  <div class="chips">
    <div class="chip" onclick="setQ(this)">전환율이 왜 떨어질까?</div>
    <div class="chip" onclick="setQ(this)">결제 실패가 증가했을까?</div>
    <div class="chip" onclick="setQ(this)">이 사용자는 왜 이탈했을까?</div>
    <div class="chip" onclick="setQ(this)">어떤 채널이 효율적일까?</div>
  </div>

</div>

<!-- KPI -->
<div class="section">
  <h3>📊 핵심 지표</h3>
  <div class="hint">
    질문에 따라 KPI는 자동으로 재구성됩니다
  </div>

  <div class="cards" id="cards"></div>
</div>

<!-- CHART -->
<div class="section">
  <h3>📈 사용자 행동 퍼널</h3>
  <div class="hint">
    Home → Search → Detail → Cart → Payment 흐름
  </div>
  <canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="section">
  <h3 id="tableTitle">📋 분석 결과</h3>
  <div id="tableBox"></div>
</div>

<!-- AI INSIGHT -->
<div class="section">
  <h3>🤖 AI Insight</h3>
  <div id="aiBox" class="box"></div>
</div>

</div>

<script>

let chart;

function run() {

  const q = document.getElementById("question").value || "전환 분석";

  // KPI
  document.getElementById("cards").innerHTML = `
    <div class="card">
      <h3>전환율 (Purchase / Visit)</h3>
      <p>${rand(50,90)}%</p>
    </div>

    <div class="card">
      <h3>결제 실패율</h3>
      <p>${rand(10,40)}%</p>
    </div>

    <div class="card">
      <h3>이탈율</h3>
      <p>${rand(10,60)}%</p>
    </div>
  `;

  drawChart();

  // TABLE
  let title = "📋 퍼널 분석 결과";
  let table = `
    <table>
      <tr><th>단계</th><th>유저 수</th></tr>
      <tr><td>Home</td><td>${rand(800,1200)}</td></tr>
      <tr><td>Detail</td><td>${rand(400,800)}</td></tr>
      <tr><td>Cart</td><td>${rand(200,500)}</td></tr>
      <tr><td>Payment</td><td>${rand(100,300)}</td></tr>
    </table>
  `;

  if (q.includes("결제")) {
    title = "📋 결제 실패 분석";
    table = `
      <table>
        <tr><th>원인</th><th>비율</th></tr>
        <tr><td>UX 문제</td><td>${rand(20,50)}%</td></tr>
        <tr><td>네트워크</td><td>${rand(10,30)}%</td></tr>
        <tr><td>카드 실패</td><td>${rand(10,40)}%</td></tr>
      </table>
    `;
  }

  document.getElementById("tableTitle").innerText = title;
  document.getElementById("tableBox").innerHTML = table;

  // AI INSIGHT (구조 강화)
  document.getElementById("aiBox").innerText = `
📌 원인 분석
- 특정 단계에서 이탈 집중 발생
- 채널별 전환율 차이 존재

🧪 가설
- 신규 유저는 결제 단계에서 신뢰 부족
- iOS 환경 UX friction 존재

🚀 해결책
- 결제 UX 단순화
- onboarding 개선

💡 시도해볼 액션
- A/B 테스트 (결제 버튼 위치)
- funnel drop 구간 개선
- 리타겟팅 캠페인

🔍 이탈 원인 분류
- UX 문제 (40%)
- 가격 문제 (30%)
- 신뢰 부족 (30%)
`;

}

// chart
function draw() {

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Home","Search","Detail","Cart","Payment"],
      datasets: [{
        label: "User Funnel",
        data: [
          rand(800,1200),
          rand(500,900),
          rand(300,700),
          rand(200,500),
          rand(100,300)
        ]
      }]
    }
  });

}

// chip
function setQ(el){
  document.getElementById("question").value = el.innerText;
  run();
}

// utils
function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

// init
window.onload = run;

</script>

</body>
</html>

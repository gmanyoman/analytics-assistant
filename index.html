
<html>
<head>
  <title>AI Analytics Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f5f7;
      padding: 30px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    select, input, button {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    .question-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .question-buttons button {
      width: auto;
      cursor: pointer;
      border: none;
    }

    .generate-btn {
      margin-top: 20px;
      background: black;
      color: white;
      cursor: pointer;
      border: none;
    }

    .cards {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ai-box {
      background: #111;
      color: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      line-height: 1.7;
    }
  </style>
</head>

<body>

<h1>AI 기반 데이터 탐색 대시보드</h1>

<div class="section">

  <h3>👤 나는 누구인가요?</h3>

  <select id="role">
    <option value="marketing">마케팅 담당자</option>
    <option value="product">프로덕트 매니저</option>
    <option value="settlement">정산 담당자</option>
  </select>

  <h3 style="margin-top:20px;">🔍 무엇이 궁금한가요?</h3>

  <div class="question-buttons">
    <button onclick="setQuestion('전환율이 왜 떨어질까?')">전환율이 왜 떨어질까?</button>

    <button onclick="setQuestion('어떤 채널이 효율적일까?')">어떤 채널이 효율적일까?</button>

    <button onclick="setQuestion('결제 실패가 증가했을까?')">결제 실패가 증가했을까?</button>
  </div>

  <input
    id="question"
    placeholder="예: 광고 유입 사용자의 구매 전환이 왜 낮을까?"
  />

  <button class="generate-btn" onclick="generateDashboard()">
    AI 추천 대시보드 생성
  </button>

</div>

<div class="cards" id="cards"></div>

<div class="chart-box">
  <canvas id="myChart"></canvas>
</div>

<div class="ai-box" id="aiExplanation">
  AI가 분석 방향을 추천해드립니다.
</div>

<script>

let chart;

function random(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function setQuestion(text) {
  document.getElementById("question").value = text;
}

function generateDashboard() {

  const question = document
    .getElementById("question")
    .value;

  const cards = document
    .getElementById("cards");

  const aiBox = document
    .getElementById("aiExplanation");

  let labels = [];
  let values = [];

  let explanation = "";

  let cardHTML = "";

  // 전환 분석
  if (question.includes("전환")) {

    const visit = random(1000, 3000);
    const cart = random(500, 1500);
    const purchase = random(100, 800);

    cardHTML = `
      <div class="card">
        <h3>방문 사용자</h3>
        <p>${visit}</p>
      </div>

      <div class="card">
        <h3>구매 전환율</h3>
        <p>${Math.floor((purchase/visit)*100)}%</p>
      </div>

      <div class="card">
        <h3>장바구니 이탈</h3>
        <p>${cart - purchase}</p>
      </div>
    `;

    labels = [
      "방문",
      "상품 조회",
      "장바구니",
      "구매"
    ];

    values = [
      visit,
      random(700, visit),
      cart,
      purchase
    ];

    explanation = `
      전환율 저하는 일반적으로
      퍼널 이탈 증가 또는 유입 품질 변화와
      연관되는 경우가 많습니다.<br><br>

      특히 광고 유입 사용자의
      장바구니 이탈률과 디바이스별 전환 차이를
      함께 분석하는 것을 추천합니다.
    `;
  }

  // 채널 분석
  else if (
    question.includes("채널") ||
    question.includes("유입")
  ) {

    cardHTML = `
      <div class="card">
        <h3>광고 유입 비율</h3>
        <p>${random(20,60)}%</p>
      </div>

      <div class="card">
        <h3>최고 전환 채널</h3>
        <p>SEO</p>
      </div>

      <div class="card">
        <h3>ROAS</h3>
        <p>${random(120,400)}%</p>
      </div>
    `;

    labels = [
      "SEO",
      "광고",
      "푸시",
      "직접유입"
    ];

    values = [
      random(100,300),
      random(100,300),
      random(100,300),
      random(100,300)
    ];

    explanation = `
      채널 효율 분석은
      유입량 자체보다 실제 구매 전환과
      리텐션을 함께 보는 것이 중요합니다.<br><br>

      광고 채널은 유입량은 높지만
      전환율이 낮을 가능성이 있어
      퍼널 비교 분석을 추천합니다.
    `;
  }

  // 결제 분석
  else if (
    question.includes("결제") ||
    question.includes("실패")
  ) {

    cardHTML = `
      <div class="card">
        <h3>결제 성공률</h3>
        <p>${random(85,99)}%</p>
      </div>

      <div class="card">
        <h3>실패 건수</h3>
        <p>${random(10,100)}</p>
      </div>

      <div class="card">
        <h3>환불 비율</h3>
        <p>${random(1,8)}%</p>
      </div>
    `;

    labels = [
      "카드",
      "계좌이체",
      "간편결제"
    ];

    values = [
      random(50,100),
      random(20,80),
      random(20,80)
    ];

    explanation = `
      결제 실패 증가는
      특정 결제수단 오류 또는 트래픽 급증과
      연관될 수 있습니다.<br><br>

      시간대별 실패율과
      결제수단별 성공률을 함께 비교하는 것을
      추천합니다.
    `;
  }

  else {

    cardHTML = `
      <div class="card">
        <h3>추천 상태</h3>
        <p>준비중</p>
      </div>
    `;

    labels = ["데이터"];
    values = [100];

    explanation = `
      질문 내용을 기반으로
      추천 분석을 준비하고 있습니다.
    `;
  }

  cards.innerHTML = cardHTML;

  aiBox.innerHTML = explanation;

  if (chart) {
    chart.destroy();
  }

  const ctx = document.getElementById("myChart");

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "추천 분석 결과",
        data: values
      }]
    }
  });
}

</script>

</body>
</html>
```

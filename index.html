<!DOCTYPE html>
<html>
<head>
  <title>AI Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f5f7;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 4px 0;
    }

    .sub {
      color: #666;
      font-size: 13px;
      margin-bottom: 10px;
    }

    /* search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 140px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    /* 예시 버튼 (복구 + 가로형 자연 배치) */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 6px 10px;
      background: #eee;
      border-radius: 18px;
      font-size: 12px;
      cursor: pointer;
    }

    /* 2-row layout */
    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    /* KPI */
    .kpi {
      display: flex;
      gap: 8px;
    }

    .kpi div {
      flex: 1;
      background: #f8f8f8;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .kpi h3 {
      margin: 0;
      font-size: 11px;
      color: #666;
    }

    .kpi p {
      margin: 4px 0 0 0;
      font-size: 18px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 6px;
    }

    th { background: #fafafa; }

    .ai {
      font-size: 12px;
      white-space: pre-line;
      line-height: 1.5;
    }

    canvas {
      height: 220px !important;
    }

  </style>
</head>

<body>

<div class="container">

<h1>AI-Powered Analytics Assistant</h1>
<div class="sub">
질문 기반으로 분석 구조가 실시간으로 바뀌는 데이터 탐색 시스템
</div>

<!-- INPUT -->
<div class="search-bar">
  <input id="q" placeholder="예: 4/23 이탈률 왜 감소했어?" />
  <button onclick="run()">분석</button>
</div>

<!-- 예시 질문 버튼 (복구) -->
<div class="chips">
  <div class="chip" onclick="setQ(this)">전환율이 왜 떨어질까?</div>
  <div class="chip" onclick="setQ(this)">결제 실패가 증가했을까?</div>
  <div class="chip" onclick="setQ(this)">이 사용자는 왜 이탈했을까?</div>
  <div class="chip" onclick="setQ(this)">어떤 채널이 효율적일까?</div>
</div>

<!-- KPI + AI -->
<div class="row">
  <div class="card">
    <div class="title">📊 KPI</div>
    <div class="kpi" id="kpi"></div>
  </div>

  <div class="card">
    <div class="title">🤖 AI Insight</div>
    <div class="ai" id="ai"></div>
  </div>
</div>

<!-- CHART + TABLE -->
<div class="row">
  <div class="card">
    <div class="title">📈 Funnel</div>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <div class="title">📋 분석 결과</div>
    <div id="table"></div>
  </div>
</div>

</div>

<script>

let chart;

function run(){

  const q = document.getElementById("q").value || "";

  let mode = "funnel";

  if (q.includes("결제")) mode = "payment";
  else if (q.includes("채널")) mode = "channel";
  else if (q.includes("4/23") || q.includes("감소")) mode = "date";
  else if (q.includes("이탈")) mode = "funnel";

  render(mode);
}

function render(mode){

  // KPI
  document.getElementById("kpi").innerHTML = `
    <div><h3>전환</h3><p>${rand(50,90)}%</p></div>
    <div><h3>실패</h3><p>${rand(10,40)}%</p></div>
    <div><h3>이탈</h3><p>${rand(10,60)}%</p></div>
  `;

  // AI
  document.getElementById("ai").innerText =
`📌 원인 분석: funnel 구간 이탈 발생
🧪 가설: UX / 채널 영향
🚀 액션: A/B 테스트 / UX 개선`;

  // TABLE
  document.getElementById("table").innerHTML = `
    <table>
      <tr><th>단계</th><th>유저</th></tr>
      <tr><td>Home</td><td>${rand(800,1200)}</td></tr>
      <tr><td>Detail</td><td>${rand(400,800)}</td></tr>
      <tr><td>Cart</td><td>${rand(200,500)}</td></tr>
      <tr><td>Pay</td><td>${rand(100,300)}</td></tr>
    </table>
  `;

  draw();
}

function draw(){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels:["Home","Search","Detail","Cart","Pay"],
      datasets:[{
        label:"users",
        data:[
          rand(800,1200),
          rand(500,900),
          rand(300,700),
          rand(200,500),
          rand(100,300)
        ]
      }]
    }
  });

}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function setQ(el){
  document.getElementById("q").value = el.innerText;
  run();
}

window.onload = run;

</script>

</body>
</html>

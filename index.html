<!DOCTYPE html>
<html>
<head>
  <title>AI-Powered Analytics Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f5f7;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 860px;
      padding: 24px;
    }

    h1 { margin-bottom: 6px; }

    .sub {
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .section {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 8px 12px;
      background: #eee;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 160px;
      background: #fff;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card h3 { font-size: 12px; color: #666; margin: 0; }
    .card p { font-size: 20px; font-weight: bold; margin-top: 6px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th { background: #fafafa; }

    .box {
      background: #111;
      color: white;
      padding: 16px;
      border-radius: 14px;
      margin-top: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .highlight {
      background: #ffe8e8;
    }

  </style>
</head>

<body>

<div class="container">

<h1>AI-Powered Analytics Assistant</h1>

<div class="sub">
질문 기반으로 사용자 행동을 탐색하고<br>
분석 방향과 인사이트를 추천합니다.
</div>

<div class="section">

  <h3>🔍 무엇이 궁금한가요?</h3>

  <input id="question">

  <div class="chips">
    <div class="chip" onclick="setQ(this)">전환율이 왜 떨어질까?</div>
    <div class="chip" onclick="setQ(this)">결제 실패가 증가했을까?</div>
    <div class="chip" onclick="setQ(this)">이 사용자는 왜 이탈했을까?</div>
    <div class="chip" onclick="setQ(this)">광고 유입 전환이 낮은 이유</div>
  </div>

</div>

<div class="cards" id="cards"></div>

<canvas id="chart"></canvas>

<div class="section" id="tableBox"></div>

<div class="section" id="aiBox"></div>

</div>

<script>

let logs = [];
let chart;

function generateLogs() {

  const users = Array.from({length:80},(_,i)=>"USER_"+(1000+i));

  const events = [
    "home_view","search","product_view",
    "add_to_cart","payment_attempt",
    "payment_fail","purchase_complete"
  ];

  const logCount = random(150,300);
  const result = [];

  for(let i=0;i<logCount;i++){
    result.push({
      user_id: pick(users),
      event: pick(events),
      device: Math.random()>0.5?"iOS":"Android",
      channel: Math.random()>0.5?"ad":"organic"
    });
  }

  return result;
}

// ---------------- 분석 ----------------
function run(){

  const q = document.getElementById("question").value || "전환 분석";

  const failIndex = random(20,60);

  document.getElementById("cards").innerHTML = `
    <div class="card"><h3>전환율</h3><p>${random(50,90)}%</p></div>
    <div class="card"><h3>실패율</h3><p>${random(10,40)}%</p></div>
    <div class="card"><h3>이탈율</h3><p>${random(10,60)}%</p></div>
  `;

  draw();

  // ---------------- 퍼널 테이블 ----------------
  let table = `
    <h3>📊 사용자 퍼널</h3>
    <table>
      <tr><th>단계</th><th>유저</th></tr>
      <tr><td>Home</td><td>${random(800,1200)}</td></tr>
      <tr><td>Detail</td><td>${random(400,800)}</td></tr>
      <tr class="${q.includes('결제')?'highlight':''}">
        <td>Payment</td><td>${random(100,400)}</td>
      </tr>
    </table>
  `;

  document.getElementById("tableBox").innerHTML = table;

  // ---------------- AI Insight ----------------
  document.getElementById("aiBox").innerHTML = `
🤖 AI Insight

📌 원인 분석
- 광고 유입 사용자 전환 낮음
- 결제 단계 UX friction 존재

🧪 가설
- iOS 결제 실패율 증가
- 신규 유저 신뢰 부족

🚀 해결책
- 결제 UX 단순화
- 실패 사용자 리타겟팅

💡 액션
- 결제 버튼 A/B 테스트
- funnel drop 구간 개선
- 신규 onboarding 개선

🔍 이탈 자동 분류
- UX 문제 (40%)
- 가격 문제 (25%)
- 신뢰 부족 (35%)
`;

  // ---------------- 질문 추천 ----------------
  const suggested = `
💬 추천 질문

- 왜 결제 실패가 발생했을까?
- 어떤 채널이 전환이 높은가?
- 이탈은 어느 단계에서 발생했는가?
- 신규 유저는 어디서 떨어지는가?
`;

  document.getElementById("aiBox").innerHTML += suggested;
}

// ---------------- 차트 ----------------
function draw(){

  const ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Home","Search","Detail","Cart","Payment"],
      datasets:[{
        label:"User Flow",
        data:[
          random(800,1200),
          random(500,900),
          random(300,700),
          random(200,500),
          random(100,300)
        ]
      }]
    }
  });
}

// ---------------- interaction: user drop click ----------------
document.addEventListener("click", (e)=>{

  if(e.target.tagName==="TD" && e.target.innerText.includes("Payment")){
    alert("👉 이 구간에서 이탈 분석: 결제 UX / 실패율 상승 가능성");
  }

});

// ---------------- utils ----------------
function setQ(el){
  document.getElementById("question").value = el.innerText;
  run();
}

function random(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// init
window.onload=function(){
  logs=generateLogs();
  run();
};

</script>

</body>
</html>
